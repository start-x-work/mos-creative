name: Deploy Web (Cloudflare Pages)

# Deploys packages/web to Cloudflare Pages (marketing-os-creative).
#
# GATE: the public site must not go live before D-6/D-7 are recorded.
# Keep this workflow_dispatch-only (manual) until the gates pass; switch to
# push:main afterwards if auto-deploy is desired (mirrors the body's habit of
# Cloudflare Git-integration auto-deploy from main).
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Use the wrangler pinned in packages/web (avoids wrangler-action's
      # root-level auto-install, which fails in a pnpm workspace).
      # Create the Pages project on first run; the `|| true` tolerates
      # subsequent runs where it already exists.
      - name: Ensure Pages project exists
        run: pnpm --filter @start-x-work/mos-creative-web exec wrangler pages project create marketing-os-creative --production-branch main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Cloudflare Pages
        run: pnpm --filter @start-x-work/mos-creative-web exec wrangler pages deploy dist --project-name=marketing-os-creative --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
